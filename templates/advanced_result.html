<!DOCTYPE html>
<html>
<head>
    <title>Advanced Health Result</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
            background: #f5f5f7;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
        }

        .good {
            border-left: 6px solid #34c759;
        }

        .warning {
            border-left: 6px solid #ffcc00;
        }

        .danger {
            border-left: 6px solid #ff3b30;
        }

        .neutral {
            border-left: 6px solid #8e8e93;
        }

        h1, h2, h3 {
            margin: 0;
        }
    </style>
</head>

<body>

<h1>Health Report</h1>

<!-- 🟣 Overall -->
<div class="card {{ overall_status }}">
    <h2>Overall Health Score</h2>
    <h1>{{ health_score }}</h1>
</div>

<!-- 🧬 BMI -->
<div class="card {{ bmi_status }}">
    <h3>BMI</h3>
    <p>{{ bmi }}</p>
</div>

<!-- 🩸 Blood Pressure -->
<div class="card {{ bp_status }}">
    <h3>Blood Pressure</h3>
    <p>{{ bp_status }}</p>
</div>

<!-- 🍬 Blood Glucose -->
<div class="card {{ glucose_status }}">
    <h3>Blood Glucose</h3>
    <p>{{ glucose_status }}</p>
</div>

<br>

<a href="/advanced">← Back</a>

</body>
</html>
